name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: SeqRevComp-macos.dmg
          - os: windows-latest
            asset_name: SeqRevComp-windows.exe
          - os: ubuntu-latest
            asset_name: SeqRevComp-linux.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Fyne CLI (macOS)
        if: runner.os == 'macOS'
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build macOS
        if: runner.os == 'macOS'
        run: |
          fyne package -os darwin -name SeqRevComp -icon Icon.png
          hdiutil create -volname "SeqRevComp" -srcfolder SeqRevComp.app -ov -format UDZO ${{ matrix.asset_name }}

      - name: Build Windows
        if: runner.os == 'Windows'
        run: go build -ldflags="-s -w" -o ${{ matrix.asset_name }} .

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          go build -ldflags="-s -w" -o seqrevcomp .
          tar -czf ${{ matrix.asset_name }} seqrevcomp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: artifacts/*
